<!DOCTYPE html>
<html lang="en">
<head>
    <title>System Health Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .log-INFO { color: #66fcf1; }       /* Cyan */
        .log-WARNING { color: #ff9f43; }    /* Orange */
        .log-ERROR { color: #ff4d4d; font-weight: bold; } /* Red */
        .log-CRITICAL { background-color: #ff4d4d; color: white; padding: 2px 5px; border-radius: 3px; }
        .console-font { font-family: 'Courier New', monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🛠️ System Health Console</span>
            <a href="/" class="btn btn-outline-light btn-sm">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="card p-4">
            <h4 class="mb-3">Application Event Stream</h4>
            <div class="table-responsive">
                <table class="table table-dark table-hover console-font">
                    <thead>
                        <tr>
                            <th style="width: 200px;">Timestamp</th>
                            <th style="width: 100px;">Level</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td class="text-muted">{{ log[0] }}</td>
                            <td class="log-{{ log[1] }}">{{ log[1] }}</td>
                            <td>{{ log[2] }}</td>
                        </tr>
                        {% else %}
                        <tr><td colspan="3" class="text-center text-muted">No system events recorded.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
